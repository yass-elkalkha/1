<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Plats Healthy — Quiz</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --green: #2D6A4F;
    --green-light: #40916C;
    --green-pale: #D8F3DC;
    --lime: #95D5B2;
    --white: #F8FDF9;
    --dark: #1B2D22;
    --gray: #6B7C72;
    --wrong: #C0392B;
    --correct: #27AE60;
  }

  body {
    font-family: 'Cairo', sans-serif;
    background: var(--dark);
    color: var(--white);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
    overflow-x: hidden;
  }

  /* SCREEN SYSTEM */
  .screen { display: none; width: 100%; max-width: 720px; }
  .screen.active { display: flex; flex-direction: column; align-items: center; }

  /* ── INTRO SCREEN ── */
  #intro {
    text-align: center;
    gap: 28px;
    animation: fadeUp .6s ease;
  }

  .logo-ring {
    width: 110px; height: 110px;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--green-light), var(--lime));
    display: flex; align-items: center; justify-content: center;
    font-size: 52px;
    box-shadow: 0 0 0 8px rgba(149,213,178,.15), 0 0 0 16px rgba(149,213,178,.07);
  }

  .brand { font-size: 13px; letter-spacing: 4px; color: var(--lime); text-transform: uppercase; }

  #intro h1 {
    font-size: clamp(28px, 6vw, 42px);
    font-weight: 900;
    line-height: 1.2;
    color: var(--white);
  }

  #intro h1 span { color: var(--lime); }

  #intro p {
    font-size: 16px;
    color: #9BBFA9;
    max-width: 480px;
    line-height: 1.7;
  }

  .meta-row {
    display: flex; gap: 24px; justify-content: center; flex-wrap: wrap;
  }

  .meta-item {
    background: rgba(149,213,178,.1);
    border: 1px solid rgba(149,213,178,.2);
    border-radius: 12px;
    padding: 12px 20px;
    display: flex; flex-direction: column; align-items: center; gap: 4px;
  }

  .meta-num { font-size: 22px; font-weight: 900; color: var(--lime); }
  .meta-label { font-size: 12px; color: #9BBFA9; }

  .btn-start {
    background: linear-gradient(135deg, var(--green-light), var(--green));
    color: white;
    border: none;
    padding: 16px 48px;
    border-radius: 50px;
    font-family: 'Cairo', sans-serif;
    font-size: 18px;
    font-weight: 700;
    cursor: pointer;
    transition: transform .2s, box-shadow .2s;
    box-shadow: 0 8px 30px rgba(64,145,108,.4);
  }
  .btn-start:hover { transform: translateY(-3px); box-shadow: 0 12px 40px rgba(64,145,108,.5); }

  /* ── QUESTION SCREEN ── */
  #quiz { gap: 24px; animation: fadeUp .4s ease; }

  .top-bar {
    width: 100%;
    display: flex; align-items: center; justify-content: space-between;
    gap: 16px;
  }

  .q-counter { font-size: 13px; color: var(--lime); font-weight: 700; letter-spacing: 1px; white-space: nowrap; }

  .progress-track {
    flex: 1;
    height: 6px;
    background: rgba(149,213,178,.15);
    border-radius: 99px;
    overflow: hidden;
  }

  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--lime), var(--green-light));
    border-radius: 99px;
    transition: width .5s ease;
  }

  .score-badge {
    background: rgba(149,213,178,.1);
    border: 1px solid rgba(149,213,178,.2);
    border-radius: 20px;
    padding: 4px 14px;
    font-size: 13px;
    font-weight: 700;
    color: var(--lime);
    white-space: nowrap;
  }

  .q-card {
    width: 100%;
    background: rgba(255,255,255,.04);
    border: 1px solid rgba(149,213,178,.12);
    border-radius: 24px;
    padding: 32px 28px;
  }

  .q-num {
    font-size: 11px;
    letter-spacing: 3px;
    color: var(--lime);
    text-transform: uppercase;
    margin-bottom: 12px;
  }

  .q-text {
    font-size: clamp(17px, 3.5vw, 22px);
    font-weight: 700;
    line-height: 1.5;
    color: var(--white);
  }

  .options { width: 100%; display: flex; flex-direction: column; gap: 12px; }

  .opt {
    background: rgba(255,255,255,.04);
    border: 1.5px solid rgba(149,213,178,.15);
    border-radius: 16px;
    padding: 16px 20px;
    font-family: 'Cairo', sans-serif;
    font-size: 16px;
    font-weight: 600;
    color: var(--white);
    cursor: pointer;
    text-align: right;
    transition: all .2s;
    display: flex; align-items: center; gap: 12px;
  }

  .opt:hover:not(:disabled) {
    background: rgba(149,213,178,.1);
    border-color: var(--lime);
    transform: translateX(-4px);
  }

  .opt .opt-letter {
    width: 32px; height: 32px;
    border-radius: 50%;
    background: rgba(149,213,178,.1);
    border: 1.5px solid rgba(149,213,178,.2);
    display: flex; align-items: center; justify-content: center;
    font-size: 13px;
    font-weight: 900;
    color: var(--lime);
    flex-shrink: 0;
    transition: all .2s;
  }

  .opt.correct {
    background: rgba(39,174,96,.15);
    border-color: var(--correct);
    animation: pulse .3s ease;
  }
  .opt.correct .opt-letter { background: var(--correct); border-color: var(--correct); color: white; }

  .opt.wrong {
    background: rgba(192,57,43,.1);
    border-color: var(--wrong);
  }
  .opt.wrong .opt-letter { background: var(--wrong); border-color: var(--wrong); color: white; }

  .opt:disabled { cursor: default; }

  .feedback-box {
    width: 100%;
    border-radius: 16px;
    padding: 16px 20px;
    font-size: 15px;
    line-height: 1.6;
    display: none;
    animation: fadeUp .3s ease;
  }
  .feedback-box.show { display: block; }
  .feedback-box.correct-fb { background: rgba(39,174,96,.12); border: 1px solid rgba(39,174,96,.3); color: #7DCEA0; }
  .feedback-box.wrong-fb { background: rgba(192,57,43,.1); border: 1px solid rgba(192,57,43,.3); color: #E59999; }

  .btn-next {
    background: linear-gradient(135deg, var(--green-light), var(--green));
    color: white;
    border: none;
    padding: 14px 40px;
    border-radius: 50px;
    font-family: 'Cairo', sans-serif;
    font-size: 16px;
    font-weight: 700;
    cursor: pointer;
    display: none;
    transition: transform .2s, box-shadow .2s;
    box-shadow: 0 6px 24px rgba(64,145,108,.35);
  }
  .btn-next.show { display: block; }
  .btn-next:hover { transform: translateY(-2px); }

  /* ── RESULT SCREEN ── */
  #result {
    text-align: center;
    gap: 24px;
    animation: fadeUp .6s ease;
  }

  .result-ring {
    width: 130px; height: 130px;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--green-light), var(--lime));
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 2px;
    box-shadow: 0 0 0 10px rgba(149,213,178,.12), 0 0 0 20px rgba(149,213,178,.06);
  }

  .result-score-num { font-size: 38px; font-weight: 900; color: white; line-height: 1; }
  .result-score-denom { font-size: 14px; color: rgba(255,255,255,.7); }

  #result h2 { font-size: clamp(22px, 5vw, 32px); font-weight: 900; }
  #result .sub { font-size: 15px; color: #9BBFA9; max-width: 420px; line-height: 1.7; }

  .answers-review {
    width: 100%;
    display: flex; flex-direction: column; gap: 10px;
    text-align: right;
  }

  .review-item {
    background: rgba(255,255,255,.04);
    border-radius: 14px;
    padding: 14px 18px;
    display: flex; gap: 12px; align-items: flex-start;
  }

  .review-icon { font-size: 18px; flex-shrink: 0; margin-top: 2px; }
  .review-q { font-size: 14px; color: #9BBFA9; margin-bottom: 4px; }
  .review-a { font-size: 15px; font-weight: 600; color: var(--white); }

  .btn-restart {
    background: transparent;
    border: 2px solid var(--lime);
    color: var(--lime);
    padding: 13px 36px;
    border-radius: 50px;
    font-family: 'Cairo', sans-serif;
    font-size: 16px;
    font-weight: 700;
    cursor: pointer;
    transition: all .2s;
  }
  .btn-restart:hover { background: var(--lime); color: var(--dark); }

  /* ANIMATIONS */
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(20px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  @keyframes pulse {
    0%   { transform: scale(1); }
    50%  { transform: scale(1.02); }
    100% { transform: scale(1); }
  }
</style>
</head>
<body>

<!-- INTRO -->
<div class="screen active" id="intro">
  <div class="logo-ring">🥗</div>
  <div class="brand">Plats Healthy</div>
  <h1>قبل ما نبدأو —<br><span>كاش سؤال صغير!</span></h1>
  <p>5 أسئلة سريعة على عاداتك في الأكل. جاوب بصدق — ما كاينش جواب غلط هنا 😄</p>
  <div class="meta-row">
    <div class="meta-item"><span class="meta-num">5</span><span class="meta-label">أسئلة</span></div>
    <div class="meta-item"><span class="meta-num">2</span><span class="meta-label">دقيقة</span></div>
    <div class="meta-item"><span class="meta-num">🏆</span><span class="meta-label">نقاط</span></div>
  </div>
  <button class="btn-start" onclick="startQuiz()">ابدأ الكويز ←</button>
</div>

<!-- QUIZ -->
<div class="screen" id="quiz">
  <div class="top-bar">
    <span class="q-counter" id="qCounter">سؤال 1 من 5</span>
    <div class="progress-track"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
    <span class="score-badge" id="scoreBadge">0 نقطة</span>
  </div>
  <div class="q-card">
    <div class="q-num" id="qNum">السؤال 01</div>
    <div class="q-text" id="qText"></div>
  </div>
  <div class="options" id="optionsContainer"></div>
  <div class="feedback-box" id="feedbackBox"></div>
  <button class="btn-next" id="btnNext" onclick="nextQuestion()">السؤال التالي ←</button>
</div>

<!-- RESULT -->
<div class="screen" id="result">
  <div class="result-ring">
    <span class="result-score-num" id="finalScore">0</span>
    <span class="result-score-denom">من 5</span>
  </div>
  <h2 id="resultTitle"></h2>
  <p class="sub" id="resultSub"></p>
  <div class="answers-review" id="answersReview"></div>
  <button class="btn-restart" onclick="restartQuiz()">🔄 العب مرة أخرى</button>
</div>

<script>
const questions = [
  {
    q: "كم مرة في الأسبوع كتاكل وجبة صحية ومتوازنة؟",
    opts: ["نادراً أو أبداً", "مرة أو مرتين", "3 إلى 4 مرات", "كل يوم"],
    correct: 3,
    fb: "ممتاز! الأكل الصحي اليومي هو الهدف — وهذا بالضبط اللي كنساعدوك تحققه مع Plats Healthy 💪"
  },
  {
    q: "واش عندك فكرة على عدد السعرات الحرارية اللي كتاكلها في اليوم؟",
    opts: ["لا، ما كنعرفش", "تقريباً نعم", "نعم، كنحسبها", "بالضبط كل يوم"],
    correct: 3,
    fb: "معظم الناس ما عندهمش فكرة! مشروعنا كيحسب السعرات عوضك — باش تتركز على حياتك 🎯"
  },
  {
    q: "فين كتاكل الغداء في الغالب؟",
    opts: ["مطعم عشوائي", "كنجيب معي من الدار", "كنطلب ديليفري", "ما كنكلش الغداء"],
    correct: 1,
    fb: "الأكل من الدار هو الأصح — لكن ماشي دائماً ممكن. Plats Healthy عندها حل وسط: جودة البيت بسهولة التوصيل 🏠"
  },
  {
    q: "شنو أكبر مشكلة كتواجهها مع الأكل الصحي؟",
    opts: ["الوقت", "الثمن غالي", "ما كنعرفش شنو ناكل", "كلهم معاً"],
    correct: 3,
    fb: "هاد هو بالضبط! الوقت + الثمن + التخطيط — Plats Healthy كتحل الثلاثة في نفس الوقت ✅"
  },
  {
    q: "واش تعرف شنو معنى 'وجبة متوازنة'؟",
    opts: ["لا، مش واضح ليا", "نعم، بروتين + كربوهيدرات + دهون صحية", "يعني بلا سكر فقط", "يعني بلا دسم"],
    correct: 1,
    fb: "صح! الوجبة المتوازنة محتاجة بروتين + كربوهيدرات + دهون صحية — وهذا اللي كنضمنه في كل طبق 🌿"
  }
];

const letters = ['أ', 'ب', 'ج', 'د'];
let current = 0, score = 0, userAnswers = [];

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function startQuiz() { showScreen('quiz'); loadQuestion(); }

function loadQuestion() {
  const q = questions[current];
  document.getElementById('qCounter').textContent = `سؤال ${current + 1} من ${questions.length}`;
  document.getElementById('qNum').textContent = `السؤال 0${current + 1}`;
  document.getElementById('qText').textContent = q.q;
  document.getElementById('progressFill').style.width = `${(current / questions.length) * 100}%`;
  document.getElementById('scoreBadge').textContent = `${score} نقطة`;

  const fb = document.getElementById('feedbackBox');
  fb.className = 'feedback-box';
  fb.textContent = '';

  const btn = document.getElementById('btnNext');
  btn.className = 'btn-next';
  btn.textContent = current === questions.length - 1 ? 'النتيجة ←' : 'السؤال التالي ←';

  const container = document.getElementById('optionsContainer');
  container.innerHTML = '';
  q.opts.forEach((opt, i) => {
    const btn = document.createElement('button');
    btn.className = 'opt';
    btn.innerHTML = `<span class="opt-letter">${letters[i]}</span>${opt}`;
    btn.onclick = () => selectAnswer(i, btn);
    container.appendChild(btn);
  });
}

function selectAnswer(idx, el) {
  const q = questions[current];
  const allOpts = document.querySelectorAll('.opt');
  allOpts.forEach(o => o.disabled = true);

  const isCorrect = idx === q.correct;
  if (isCorrect) { score++; el.classList.add('correct'); }
  else {
    el.classList.add('wrong');
    allOpts[q.correct].classList.add('correct');
  }

  userAnswers.push({ q: q.q, chosen: q.opts[idx], correct: q.opts[q.correct], ok: isCorrect });

  const fb = document.getElementById('feedbackBox');
  fb.textContent = (isCorrect ? '✅ ' : '❌ ') + q.fb;
  fb.className = `feedback-box show ${isCorrect ? 'correct-fb' : 'wrong-fb'}`;

  document.getElementById('btnNext').className = 'btn-next show';
}

function nextQuestion() {
  current++;
  if (current < questions.length) loadQuestion();
  else showResult();
}

function showResult() {
  document.getElementById('progressFill').style.width = '100%';
  showScreen('result');

  document.getElementById('finalScore').textContent = score;

  let title, sub;
  if (score === 5) {
    title = 'مثالي! أنت خبير التغذية 🏆';
    sub = 'معرفتك بالأكل الصحي ممتازة — Plats Healthy كتكمل ما بدأته!';
  } else if (score >= 3) {
    title = 'مزيان! فاهم الأساسيات 👍';
    sub = 'عندك قاعدة كويسة — Plats Healthy غادي يساعدك تطور أكتر.';
  } else {
    title = 'لا بأس — كلنا بدأنا من هنا 💚';
    sub = 'اليوم هو أحسن وقت تبدأ فيه رحلتك نحو أكل أفضل. Plats Healthy هنا معاك.';
  }

  document.getElementById('resultTitle').textContent = title;
  document.getElementById('resultSub').textContent = sub;

  const review = document.getElementById('answersReview');
  review.innerHTML = '';
  userAnswers.forEach(a => {
    const div = document.createElement('div');
    div.className = 'review-item';
    div.innerHTML = `
      <span class="review-icon">${a.ok ? '✅' : '❌'}</span>
      <div>
        <div class="review-q">${a.q}</div>
        <div class="review-a">${a.ok ? a.chosen : `جوابك: ${a.chosen} — الصح: ${a.correct}`}</div>
      </div>`;
    review.appendChild(div);
  });
}

function restartQuiz() {
  current = 0; score = 0; userAnswers = [];
  showScreen('intro');
}
</script>
</body>
</html>
